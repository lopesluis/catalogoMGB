<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-save { background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-cancel { background: #6c757d; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .info-text { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✏️ Editar Usuário</h1>
            <a href="{{ url_for('admin_usuarios') }}" class="btn-cancel">← Voltar</a>
        </header>

        <div class="form-container">
            <form method="POST">
                <div class="form-group">
                    <label>Usuário (login)</label>
                    <input type="text" value="{{ usuario.username }}" disabled>
                    <div class="info-text">O nome de usuário não pode ser alterado</div>
                </div>

                <div class="form-group">
                    <label>Nome completo *</label>
                    <input type="text" name="nome" value="{{ usuario.nome }}" required>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" value="{{ usuario.email }}" required>
                </div>

                <div class="form-group">
                    <label>Papel *</label>
                    <select name="papel" required>
                        <option value="cadastrador" {% if usuario.papel == 'cadastrador' %}selected{% endif %}>📝 Cadastrador</option>
                        <option value="admin" {% if usuario.papel == 'admin' %}selected{% endif %}>👑 Administrador</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nova senha (opcional)</label>
                    <input type="password" name="nova_senha" placeholder="Deixe em branco para manter a atual">
                    <div class="info-text">Mínimo 4 caracteres</div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-save">💾 Salvar Alterações</button>
                    <a href="{{ url_for('admin_usuarios') }}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
